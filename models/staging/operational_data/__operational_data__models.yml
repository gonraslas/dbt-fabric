models:
  - name: stg_almacen
    description: "Modelo que limpia y transforma la información de la tabla almacen."
    columns:
      - name: id_almacen
        description: "Identificador único del almacén en el modelo."
        data_tests:
          - not_null
          - unique
      - name: nombre_almacen
        description: "Nombre del almacén en mayúsculas."
        tests:
          - not_null
      - name: latitud
        description: "Latitud del almacén en el modelo."
        tests:
          - not_null
      - name: longitud
        description: "Longitud del almacén en el modelo."
        tests:
          - not_null
  - name: stg_articulo
    description: "Tabla de artículos con sus atributos principales"
    columns:
      - name: id_articulo
        description: "ID único del artículo"
        tests:
          - not_null
          - unique
      - name: ref_articulo
        description: "Referencia del artículo"
      - name: descripcion
        description: "Descripción del artículo"
      - name: peso
        description: "Peso del artículo"
      - name: volumen
        description: "Volumen del artículo"
      - name: id_mercado
        description: "ID del mercado asociado al artículo"