version: 2

models:

  - name: slv_ubicacion
    description: "Ubicaciones dentro de los almacenes"
    columns:
      - name: id_ubicacion
        description: "Identificador único de la localización (PK)"

      - name: ref_ubicacion
        description: "Identificador alfanumérico (10 caracteres) de la ubicación"

      - name: id_almacen
        description: "Identificador del almacén donde se encuentra (FK)"


      - name: id_tipo_ubicacion
        description: "Identificador del tipo de ubicación (FK)"


  - name: slv_tipo_ubicacion
    description: "Tipos de ubicación dentro del almacén"
    columns:
      - name: id_tipo_ubicacion
        description: "Identificador único del tipo de ubicación (PK)"

      - name: tipo_ubicacion
        description: "Descripción del tipo de ubicación"

  - name: slv_contenedor
    description: "Contenedores logísticos"
    columns:
      - name: id_contenedor
        description: "Identificador único del contenedor (PK)"

      - name: id_ubicacion
        description: "Ubicación del contenedor (FK)"

      - name: id_envio
        description: "Envío asociado (FK)"

      - name: id_recepcion
        description: "Recepción asociada (FK)"

      - name: ref_contenedor
        description: "Identificador alfanumérico del contenedor"

  - name: slv_contenido
    description: "Contenido de los contenedores"
    columns:
      - name: id_contenedor
        description: "Contenedor donde se encuentra el contenido (FK)"

      - name: id_articulo
        description: "Artículo contenido (FK)"

      - name: num_unidades
        description: "Cantidad de artículos"

      - name: precio_unidad
        description: "Precio de compra por unidad"

  - name: slv_recepcion
    description: "Recepciones de mercancía"
    columns:
      - name: id_recepcion
        description: "Identificador único de la recepción (PK)"

      - name: fecha_prevista
        description: "Fecha prevista de recepción"

      - name: fecha_recepcion
        description: "Fecha real de recepción"

      - name: id_estado_recepcion
        description: "Estado de la recepción (FK)"

      - name: id_proveedor
        description: "Proveedor (FK)"

      - name: id_almacen
        description: "Almacén receptor (FK)"

  - name: slv_estado_recepcion
    description: "Estados de recepción"
    columns:
      - name: id_estado_recepcion
        description: "Identificador único (PK)"

      - name: descripcion
        description: "Descripción del estado"

  - name: slv_envio
    description: "Envíos a tiendas"
    columns:
      - name: id_envio
        description: "Identificador único del envío (PK)"

      - name: id_transportista
        description: "Transportista (FK)"

      - name: fecha_prevista
        description: "Fecha prevista de envío"

      - name: fecha_envio
        description: "Fecha real de envío"

      - name: id_estado_envio
        description: "Estado del envío (FK)"

      - name: id_tienda
        description: "Tienda destino (FK)"

  - name: slv_estado_envio
    description: "Estados de envío"
    columns:
      - name: id_estado_envio
        description: "Identificador único (PK)"

      - name: descripcion
        description: "Descripción del estado"

  - name: slv_transportista
    description: "Transportistas"
    columns:
      - name: id_transportista
        description: "Identificador único del transportista (PK)"

      - name: descripcion
        description: "Descripción del transportista"

  - name: slv_proveedor
    description: "Proveedores"
    columns:
      - name: id_proveedor
        description: "Identificador único del proveedor (PK)"

      - name: descripcion
        description: "Descripción del proveedor"